name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t sangu7991/app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push sangu7991/app:${{ github.sha }}
      - name: Update manifests repo
        env:
          TOKEN: ${{ secrets.PAT_TOKEN }}
        run: |
         git clone https://github.com/sangeethagowda28/k8s-manifests.git
         cd k8s-manifests
         git config user.name "github-actions"
         git config user.email "actions@github.com"

         git config credential.helper store
         echo "https://${TOKEN}:x-oauth-basic@github.com" > ~/.git-credentials


         sed -i 's|image: .*|image: sangeethagowda28/app:${{ github.sha }}|' deployment.yaml
         git add .
         git commit -m "Update image to ${{ github.sha }}"
         git push origin main
