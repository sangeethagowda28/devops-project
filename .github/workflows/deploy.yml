name: Build and Deploy

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      # Checkout app repo
      - name: Checkout code
        uses: actions/checkout@v3

      # Login to Docker Hub
      - name: Login to Docker Hub
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin

      # Build image with unique tag
      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }} .

      # Push image
      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}

      # Install yq (safe YAML editor)
      - name: Install yq
        run: sudo snap install yq

      # Clone manifests repo and update image safely
      - name: Update manifest repo
        run: |
          git clone https://${{ secrets.GITHUB_TOKEN_PAT }}@github.com/sangeethagowda28/k8s-manifests.git
          cd k8s-manifests

          yq e -i '.spec.template.spec.containers[0].image = "'${{ secrets.DOCKER_USERNAME }}/my-app:${{ github.sha }}'"' deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push
