name: CI-CD Pipeline

on:
  push:
    branches:
      - main

jobs:
  build-and-update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout app repo
        uses: actions/checkout@v3

      - name: Build Docker image
        run: |
          docker build -t sangu7991/app:${{ github.sha }} .

      - name: Push Docker image
        run: |
          echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USERNAME }}" --password-stdin
          docker push sangu7991/app:${{ github.sha }}
      - name: Update manifests repo
        run: |
          git clone https://${{ secrets.PAT_TOKEN }}@github.com/sangeethagowda28/k8s-manifests.git
          cd k8s-manifests

          git remote set-url origin https://${{ secrets.PAT_TOKEN }}@github.com/sangeethagowda28/k8s-manifests.git
  
          sed -i 's|image: .*|image: sangeethagowda28/app:${{ github.sha }}|' deployment.yaml

          git config user.name "github-actions"
          git config user.email "actions@github.com"

          git add .
          git commit -m "Update image to ${{ github.sha }}"
          git push origin main
      
