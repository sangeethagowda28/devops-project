apiVersion: apps/v1
kind: Deployment
metadata:
  name: devops-app

spec:
  replicas: 4

  selector:
    matchLabels:
      app: devops-app

  template:
    metadata:
      labels:
        app: devops-app

    spec:
      containers:
      - name: devops-app
        image: sangu7991/app:${{ github.sha }}
        ports:
        - containerPort: 5000
      imagePullSecrets:
      - name: regcred
